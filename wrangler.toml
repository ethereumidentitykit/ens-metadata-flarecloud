name = "ens-metadata-flarecloud"
main = "src/index.ts"
compatibility_date = "2026-04-19"
compatibility_flags = ["nodejs_compat"]

[placement]
mode = "smart"

[vars]
CF_ZONE_ID = "4afbac62839fe25b7c506f94eb6b9c87"
ETH_RPC_URL = "https://eth.drpc.org"
SEPOLIA_RPC_URL = "https://sepolia.drpc.org"
HOLESKY_RPC_URL = "https://holesky.drpc.org"
IPFS_GATEWAYS = "https://apac.orbitor.dev,https://eu.orbitor.dev,https://latam.orbitor.dev,https://ipfs.filebase.io,https://dweb.link,https://4everland.io,https://ipfs.io"
ENSNODE_URL_MAINNET = "https://api.alpha.ensnode.io"
ENSNODE_URL_SEPOLIA = "https://api.alpha-sepolia.ensnode.io"
ENSNODE_URL_HOLESKY = ""
# Optional ENSv2 EthRegistry addresses for namehash lookups (leave empty until deployed)
ENS_REGISTRY_V2_MAINNET = ""
ENS_REGISTRY_V2_SEPOLIA = ""
ENS_REGISTRY_V2_HOLESKY = ""

[[r2_buckets]]
binding = "IPFS_CACHE"
bucket_name = "ens-metadata-ipfs-cache"
preview_bucket_name = "ens-metadata-ipfs-cache"

[[kv_namespaces]]
binding = "RESOLVER_CACHE"
id = "230eddacc2c6470eb4d5e3100fae4d4a"
preview_id = "00000000000000000000000000000000"

[[rules]]
type = "Data"
globs = ["**/*.otf", "**/*.ttf"]
fallthrough = true

[[rules]]
type = "Text"
globs = ["**/*.svg"]
fallthrough = true

[[rules]]
type = "CompiledWasm"
globs = ["**/*.wasm"]
fallthrough = true

[observability]
enabled = true
head_sampling_rate = 1